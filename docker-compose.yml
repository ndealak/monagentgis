version: '3.8'

services:
  openmapagents:
    build: .
    container_name: openmapagents
    ports:
      - "8000:8000"
    environment:
      # Configuration LLM
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # Configuration DuckDB
      OVERTURE_RELEASE: 2026-03-18.0
      DUCKDB_MEMORY: 4GB
      DUCKDB_THREADS: 4
      
      # Cache
      CACHE_DIR: /app/data/cache
    volumes:
      - ./data/cache:/app/data/cache
      - ./backend/.env:/app/backend/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  cache:
